<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360">
  <defs>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#080808"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b08830" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c8a040" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b08830" stop-opacity="0"/>
    </linearGradient>
    <filter id="softglow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- 배경 -->
  <rect width="280" height="360" fill="url(#dark)"/>

  <!-- 지하철 내부 느낌 -->
  <!-- 천장 -->
  <rect x="0" y="0" width="280" height="50" fill="#111"/>
  <!-- 형광등 -->
  <rect x="40"  y="18" width="60" height="8" rx="4" fill="#c8b870" opacity="0.15" filter="url(#softglow)"/>
  <rect x="40"  y="18" width="60" height="8" rx="4" fill="#e8d890" opacity="0.6"/>
  <rect x="180" y="18" width="60" height="8" rx="4" fill="#c8b870" opacity="0.15" filter="url(#softglow)"/>
  <rect x="180" y="18" width="60" height="8" rx="4" fill="#e8d890" opacity="0.6"/>

  <!-- 창문 (밤 풍경) -->
  <rect x="10"  y="55" width="110" height="80" rx="4" fill="#0a0a14"/>
  <rect x="160" y="55" width="110" height="80" rx="4" fill="#0a0a14"/>
  <!-- 창밖 불빛 -->
  <circle cx="50"  cy="88" r="3" fill="#f0c040" opacity="0.5"/>
  <circle cx="80"  cy="74" r="2" fill="#e0a030" opacity="0.4"/>
  <circle cx="105" cy="100" r="2" fill="#f0c040" opacity="0.35"/>
  <circle cx="185" cy="82" r="3" fill="#f0c040" opacity="0.5"/>
  <circle cx="215" cy="68" r="2" fill="#e0a030" opacity="0.4"/>
  <circle cx="245" cy="96" r="2" fill="#f0c040" opacity="0.35"/>

  <!-- 지하철 손잡이 봉 -->
  <rect x="135" y="50" width="10" height="100" fill="#2a2a2a"/>
  <!-- 손잡이 링 -->
  <ellipse cx="140" cy="145" rx="14" ry="9" fill="none" stroke="#3a3a3a" stroke-width="3"/>

  <!-- 좌석 -->
  <rect x="0"   y="230" width="115" height="60" rx="4" fill="#1a1a22"/>
  <rect x="165" y="230" width="115" height="60" rx="4" fill="#1a1a22"/>

  <!-- 인물 실루엣 - 두 사람 (아저씨 & 이지안) -->
  <!-- 아저씨 (큰 실루엣, 왼쪽) -->
  <ellipse cx="88" cy="218" rx="22" ry="8" fill="#0d0d0d"/>
  <rect x="68"   y="170" width="40" height="52" rx="6" fill="#0d0d0d"/>
  <circle cx="88" cy="162" r="16" fill="#0d0d0d"/>

  <!-- 이지안 (작은 실루엣, 오른쪽) -->
  <ellipse cx="195" cy="224" rx="16" ry="6" fill="#0d0d0d"/>
  <rect x="181"  y="185" width="28" height="40" rx="5" fill="#0d0d0d"/>
  <circle cx="195" cy="178" r="12" fill="#0d0d0d"/>
  <!-- 이어폰 줄 -->
  <path d="M195 190 Q220 195 230 180" stroke="#333" stroke-width="1.5" fill="none"/>

  <!-- 황금빛 구분선 -->
  <rect x="20" y="290" width="240" height="1" fill="url(#light)" opacity="0.6"/>

  <!-- 타이틀 -->
  <text x="140" y="314"
    font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif"
    font-size="26" font-weight="900"
    fill="#c8a040" text-anchor="middle" letter-spacing="4">나의 아저씨</text>
  <text x="140" y="334"
    font-family="sans-serif" font-size="10"
    fill="#7a6020" text-anchor="middle" letter-spacing="2">MY MISTER · 2018</text>
  <text x="140" y="350"
    font-family="sans-serif" font-size="9"
    fill="#4a3a10" text-anchor="middle">tvN · 이선균 · 아이유</text>
</svg>
