<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360">
  <defs>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b1a1a"/>
      <stop offset="100%" style="stop-color:#5a0e0e"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b1212"/>
      <stop offset="100%" style="stop-color:#8b1a1a"/>
    </linearGradient>
  </defs>
  <!-- Book cover background -->
  <rect width="280" height="360" fill="url(#cover)"/>
  <!-- Spine shadow -->
  <rect x="0" y="0" width="16" height="360" fill="url(#spine)"/>
  <!-- Top gold bar -->
  <rect x="0" y="0" width="280" height="10" fill="#d4a017"/>
  <!-- Bottom gold bar -->
  <rect x="0" y="350" width="280" height="10" fill="#d4a017"/>
  <!-- Feynman diagram decoration (wavy photon line) -->
  <path d="M 40 120 C 55 100 70 140 85 120 C 100 100 115 140 130 120 C 145 100 160 140 175 120 C 190 100 205 140 220 120 C 235 100 250 130 240 130" stroke="#d4a017" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Electron lines -->
  <line x1="40" y1="130" x2="130" y2="170" stroke="#d4a017" stroke-width="1.5" opacity="0.5"/>
  <line x1="240" y1="130" x2="150" y2="170" stroke="#d4a017" stroke-width="1.5" opacity="0.5"/>
  <!-- Vertex dots -->
  <circle cx="130" cy="170" r="5" fill="#d4a017" opacity="0.7"/>
  <circle cx="150" cy="170" r="5" fill="#d4a017" opacity="0.7"/>
  <!-- Divider line -->
  <line x1="24" y1="180" x2="256" y2="180" stroke="#d4a017" stroke-width="0.8" opacity="0.4"/>
  <!-- Title text -->
  <text x="148" y="52" font-family="serif" font-size="13" fill="#f0c060" text-anchor="middle" letter-spacing="2">THE FEYNMAN</text>
  <text x="148" y="72" font-family="serif" font-size="13" fill="#f0c060" text-anchor="middle" letter-spacing="1">LECTURES ON</text>
  <text x="148" y="96" font-family="serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">PHYSICS</text>
  <!-- Volume label -->
  <text x="148" y="210" font-family="serif" font-size="11" fill="#d4a017" text-anchor="middle" opacity="0.8">VOLUME I</text>
  <!-- Author -->
  <text x="148" y="290" font-family="serif" font-size="12" fill="#f0d080" text-anchor="middle">Richard P. Feynman</text>
  <text x="148" y="308" font-family="serif" font-size="10" fill="#c09040" text-anchor="middle">Robert B. Leighton</text>
  <text x="148" y="323" font-family="serif" font-size="10" fill="#c09040" text-anchor="middle">Matthew Sands</text>
  <!-- Caltech logo placeholder -->
  <circle cx="148" cy="248" r="20" fill="none" stroke="#d4a017" stroke-width="1" opacity="0.4"/>
  <text x="148" y="253" font-family="serif" font-size="10" fill="#d4a017" text-anchor="middle" opacity="0.6">CALTECH</text>
</svg>
