<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0e0c08"/>
      <stop offset="100%" stop-color="#1a1408"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%"   stop-color="#b08830" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b08830" stop-opacity="0"/>
    </radialGradient>
    <filter id="fg"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="fg2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- 배경 -->
  <rect width="280" height="280" fill="url(#bg)"/>

  <!-- 따뜻한 글로우 -->
  <ellipse cx="140" cy="125" rx="100" ry="80" fill="url(#warmGlow)"/>

  <!-- 지하철 창문 프레임 (어두운 밤) -->
  <rect x="30" y="40" width="220" height="150" rx="6" fill="#080808"/>
  <rect x="30" y="40" width="220" height="150" rx="6" fill="none" stroke="#2a2010" stroke-width="3"/>

  <!-- 창밖 지나가는 불빛 (motion blur 느낌) -->
  <line x1="40"  y1="82"  x2="100" y2="82"  stroke="#c8a040" stroke-width="1.5" opacity="0.25"/>
  <line x1="50"  y1="95"  x2="130" y2="95"  stroke="#c8a040" stroke-width="1"   opacity="0.2"/>
  <line x1="40"  y1="108" x2="90"  y2="108" stroke="#c8a040" stroke-width="1.5" opacity="0.18"/>
  <line x1="155" y1="75"  x2="240" y2="75"  stroke="#c8a040" stroke-width="1"   opacity="0.22"/>
  <line x1="170" y1="100" x2="245" y2="100" stroke="#c8a040" stroke-width="1.5" opacity="0.18"/>
  <line x1="160" y1="118" x2="235" y2="118" stroke="#c8a040" stroke-width="1"   opacity="0.15"/>

  <!-- 창 반사 - 인물 실루엣 (옆모습) -->
  <!-- 창문 중앙에 희미하게 -->
  <ellipse cx="140" cy="105" rx="18" ry="20" fill="#1a1208" opacity="0.8"/>
  <rect x="126"  cy="125" x="126" y="122" width="28" height="35" rx="5" fill="#1a1208" opacity="0.7"/>

  <!-- 이어폰 줄 희미하게 -->
  <path d="M148 118 Q162 130 168 150" stroke="#2a1e08" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- 창문 테두리 반사 -->
  <rect x="30" y="40" width="220" height="150" rx="6" fill="none" stroke="#3a2a10" stroke-width="1" opacity="0.5"/>

  <!-- 구분선 -->
  <line x1="40" y1="205" x2="240" y2="205" stroke="#3a2a10" stroke-width="1" opacity="0.5"/>

  <!-- 앨범 정보 -->
  <text x="140" y="226"
    font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif"
    font-size="30" font-weight="700"
    fill="#c8a040" text-anchor="middle">어른</text>
  <text x="140" y="248"
    font-family="sans-serif" font-size="12"
    fill="#7a6020" text-anchor="middle" letter-spacing="3">Sondia</text>
  <text x="140" y="265"
    font-family="sans-serif" font-size="10"
    fill="#4a3a10" text-anchor="middle">나의 아저씨 OST · 2018</text>
</svg>
