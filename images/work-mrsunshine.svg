<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a1a"/>
      <stop offset="40%"  stop-color="#1a1030"/>
      <stop offset="70%"  stop-color="#3d2010"/>
      <stop offset="100%" stop-color="#7a3a08"/>
    </linearGradient>
    <radialGradient id="moon" cx="60%" cy="25%" r="12%">
      <stop offset="0%"   stop-color="#fff8e0" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#ffe880" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffe880" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- 배경 하늘 -->
  <rect width="280" height="360" fill="url(#sky)"/>

  <!-- 달빛 글로우 -->
  <circle cx="168" cy="72" r="40" fill="#ffe070" opacity="0.08"/>
  <circle cx="168" cy="72" r="22" fill="url(#moon)"/>
  <circle cx="168" cy="72" r="14" fill="#fff8e0" opacity="0.9"/>

  <!-- 별 -->
  <circle cx="40"  cy="30"  r="1"   fill="white" opacity="0.7"/>
  <circle cx="80"  cy="18"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="220" cy="24"  r="1.2" fill="white" opacity="0.6"/>
  <circle cx="250" cy="50"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="30"  cy="70"  r="1"   fill="white" opacity="0.4"/>
  <circle cx="110" cy="38"  r="0.7" fill="white" opacity="0.5"/>

  <!-- 지평선 / 땅 -->
  <rect x="0" y="270" width="280" height="90" fill="#1a0a00" opacity="0.9"/>

  <!-- 전통 건물 실루엣 -->
  <!-- 지붕 1 (왼쪽) -->
  <polygon points="20,240 60,210 100,240" fill="#0d0600"/>
  <rect x="30" y="240" width="60" height="30" fill="#0d0600"/>
  <!-- 지붕 2 (중앙) -->
  <polygon points="90,230 140,195 190,230" fill="#0a0400"/>
  <rect x="100" y="230" width="80" height="40" fill="#0a0400"/>
  <!-- 지붕 3 (오른쪽) -->
  <polygon points="185,245 220,218 255,245" fill="#0d0600"/>
  <rect x="193" y="245" width="54" height="25" fill="#0d0600"/>

  <!-- 창문 빛 (건물 안) -->
  <rect x="48"  y="248" width="10" height="12" fill="#c87020" opacity="0.6"/>
  <rect x="62"  y="248" width="10" height="12" fill="#c87020" opacity="0.5"/>
  <rect x="118" y="238" width="12" height="15" fill="#b06010" opacity="0.6"/>
  <rect x="148" y="238" width="12" height="15" fill="#b06010" opacity="0.5"/>
  <rect x="204" y="252" width="9"  height="11" fill="#c87020" opacity="0.5"/>

  <!-- 인물 실루엣 (군복 느낌) -->
  <!-- 몸 -->
  <rect x="122" y="175" width="18" height="45" fill="#0d0600" opacity="0.95"/>
  <!-- 머리 -->
  <circle cx="131" cy="168" r="9" fill="#0d0600" opacity="0.95"/>
  <!-- 모자 챙 -->
  <ellipse cx="131" cy="160" rx="14" ry="3" fill="#0d0600" opacity="0.95"/>
  <rect x="124" y="155" width="14" height="6" fill="#0d0600" opacity="0.95"/>

  <!-- 타이틀 -->
  <text x="140" y="316"
    font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif"
    font-size="19" font-weight="900"
    fill="#d4a040" text-anchor="middle" letter-spacing="3">미스터 션샤인</text>
  <text x="140" y="336"
    font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif"
    font-size="10" fill="#8a6020" text-anchor="middle" letter-spacing="2">MR. SUNSHINE · 2018</text>
  <text x="140" y="352"
    font-family="sans-serif" font-size="9" fill="#5a4010" text-anchor="middle">tvN · 이병헌 · 김태리</text>
</svg>
