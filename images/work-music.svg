<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">
  <defs>
    <radialGradient id="glow" cx="50%" cy="52%" r="30%">
      <stop offset="0%"   stop-color="#d4e800" stop-opacity="0.95"/>
      <stop offset="30%"  stop-color="#a0b800" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#4a5500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="52%" r="50%">
      <stop offset="0%"   stop-color="#c8d400" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2.5"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>

  <!-- 완전한 암흑 배경 -->
  <rect width="280" height="280" fill="#050505"/>

  <!-- 가장 바깥 글로우 (넓게 번지는 빛) -->
  <ellipse cx="140" cy="148" rx="110" ry="90" fill="#8a9600" opacity="0.06" filter="url(#blur3)"/>

  <!-- 중간 글로우 레이어 -->
  <ellipse cx="140" cy="148" rx="70" ry="55" fill="#bccf00" opacity="0.18" filter="url(#blur1)"/>

  <!-- 핵심 광원 -->
  <ellipse cx="140" cy="148" rx="38" ry="28" fill="url(#glow)" filter="url(#blur2)"/>

  <!-- 광원 중심 (가장 밝은 점) -->
  <ellipse cx="140" cy="148" rx="14" ry="10" fill="#e8ff00" opacity="0.9"/>
  <ellipse cx="140" cy="147" rx="6"  ry="4"  fill="#f8ff88" opacity="0.95"/>

  <!-- 바닥 반사 (그림자처럼 깔리는 반사광) -->
  <ellipse cx="140" cy="190" rx="55" ry="8" fill="#8a9600" opacity="0.12" filter="url(#blur1)"/>

  <!-- 타이틀 -->
  <text x="140" y="244"
    font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif"
    font-size="34"
    font-weight="700"
    fill="#d4e800"
    text-anchor="middle"
    opacity="0.92">신기루</text>

  <!-- 아티스트 -->
  <text x="140" y="266"
    font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif"
    font-size="13"
    fill="#7a8800"
    text-anchor="middle"
    letter-spacing="4">C JAMM</text>
</svg>
