<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360">
  <defs>
    <radialGradient id="space" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#000005"/>
    </radialGradient>
    <radialGradient id="blackhole" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  style="stop-color:#000000"/>
      <stop offset="40%" style="stop-color:#000000"/>
      <stop offset="60%" style="stop-color:#e88c1a;stop-opacity:0.6"/>
      <stop offset="80%" style="stop-color:#c05a00;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="accretion" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  style="stop-color:#ffaa00;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#e07800;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#803000;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Space background -->
  <rect width="280" height="360" fill="url(#space)"/>
  <!-- Stars -->
  <circle cx="30"  cy="20"  r="1"   fill="white" opacity="0.8"/>
  <circle cx="80"  cy="45"  r="0.8" fill="white" opacity="0.6"/>
  <circle cx="230" cy="30"  r="1.2" fill="white" opacity="0.7"/>
  <circle cx="260" cy="80"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="15"  cy="100" r="1"   fill="white" opacity="0.6"/>
  <circle cx="255" cy="130" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="40"  cy="160" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="270" cy="200" r="1"   fill="white" opacity="0.6"/>
  <circle cx="10"  cy="250" r="0.8" fill="white" opacity="0.5"/>
  <!-- Accretion disk - flat ellipse -->
  <ellipse cx="140" cy="155" rx="95" ry="18" fill="url(#accretion)" opacity="0.85"/>
  <!-- Black hole -->
  <circle cx="140" cy="150" r="50" fill="url(#blackhole)"/>
  <!-- Accretion disk behind (below black hole) -->
  <ellipse cx="140" cy="160" rx="95" ry="14" fill="none" stroke="#e07800" stroke-width="2" opacity="0.3"/>
  <!-- Lensing glow ring -->
  <circle cx="140" cy="150" r="54" fill="none" stroke="#ff9500" stroke-width="3" opacity="0.25"/>
  <circle cx="140" cy="150" r="58" fill="none" stroke="#e07800" stroke-width="1.5" opacity="0.15"/>
  <!-- Title -->
  <text x="140" y="290" font-family="sans-serif" font-size="28" fill="white" text-anchor="middle" letter-spacing="4" font-weight="300">INTER</text>
  <text x="140" y="318" font-family="sans-serif" font-size="28" fill="white" text-anchor="middle" letter-spacing="4" font-weight="300">STELLAR</text>
  <!-- Tagline -->
  <text x="140" y="345" font-family="sans-serif" font-size="9" fill="#aaaaaa" text-anchor="middle" letter-spacing="2">CHRISTOPHER NOLAN · 2014</text>
</svg>
